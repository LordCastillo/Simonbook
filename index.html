<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Preload LCP Image -->
    <link rel="preload" as="image" href="/images/book.JPG" fetchpriority="high" />

    <!-- SEO Metadata -->
    <title>THE STORY BEHIND THE MAN | Simon Leviev Official Autobiography</title>
    <meta name="description" content="The official autobiography of Simon Leviev. Go behind the headlines and luxury cars to discover the raw, uncensored truth of a life defined by extremes." />
    <meta name="keywords" content="Simon Leviev, The Story Behind The Man, Tinder Swindler, Autobiography, Memoir, True Story" />
    <link rel="canonical" href="https://simonleviev.com" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://simonleviev.com" />
    <meta property="og:title" content="THE STORY BEHIND THE MAN | Simon Leviev Official Autobiography" />
    <meta property="og:description" content="The official autobiography of Simon Leviev. Go behind the headlines and luxury cars to discover the raw, uncensored truth." />
    <meta property="og:image" content="/images/book.JPG" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://simonleviev.com" />
    <meta property="twitter:title" content="THE STORY BEHIND THE MAN | Simon Leviev Official Autobiography" />
    <meta property="twitter:description" content="The official autobiography of Simon Leviev. Go behind the headlines and luxury cars to discover the raw, uncensored truth." />
    <meta property="twitter:image" content="/images/book.JPG" />

    <!-- Performance: DNS Prefetch and Preconnect -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com">
    <link rel="dns-prefetch" href="https://fonts.gstatic.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Async Font Loading to prevent render blocking -->
    <link 
      rel="preload" 
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" 
      as="style" 
      onload="this.onload=null;this.rel='stylesheet'"
    >
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet">
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
